<!DOCTYPE html><html>
<head>
  <title>🚀 ULTRA SNIPER AI SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#020617; color:white; font-family:Arial; }
    .card { background:#0f172a; padding:15px; margin:10px; border-radius:10px; }
    .buy { color:#22c55e; }
    .sell { color:#ef4444; }
  </style>
</head>
<body><div class="card">
  <button onclick="start()">💣 Start ULTRA SNIPER</button>
</div><div class="card">
  <h3 id="signal">WAIT...</h3>
  <p id="info"></p>
  <p id="stats"></p>
  <p id="balance"></p>
</div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";
const BOT_TOKEN = "8276519624:AAHCboXuosrJCLcqQi6ZP4f0MT1xY7voPuk";
const CHAT_ID = "741726963";

const PAIRS = [
  "EUR/USD",
  "GBP/USD",
  "USD/JPY",
  "AUD/USD",
  "USD/CAD",
  "EUR/JPY"
];

let wins = 0, losses = 0;
let balance = 10;
let tradeAmount = 1;
let lastSignal = null;
let lastSignalTime = 0;

function sendTelegram(msg){
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

async function getData(pair){
 let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=60&apikey=${API_KEY}`;
 let res = await fetch(url);
 let data = await res.json();
 if(!data.values) return null;
 return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
 let k=2/(p+1), e=data[0];
 for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
 return e;
}

function fakeBreakout(data){
 let last=data[data.length-1];
 let prev=data[data.length-2];
 let high=Math.max(...data.slice(-6));
 let low=Math.min(...data.slice(-6));
 if(last>high && last<prev) return true;
 if(last<low && last>prev) return true;
 return false;
}

function strongCandle(data){
 let last=data[data.length-1];
 let prev=data[data.length-2];
 return Math.abs(last-prev) > 0.0004;
}

function updateUI(prob){
 document.getElementById("stats").innerHTML = `Win: ${wins} | Loss: ${losses}`;
 document.getElementById("balance").innerHTML = `Balance: $${balance.toFixed(2)} | Trade: $${tradeAmount.toFixed(2)} | Win%: ${prob}%`;
}

function AIAdjust(){
 let total = wins + losses;
 if(total < 5) return;
 let winRate = (wins / total) * 100;
 if(winRate > 70) tradeAmount *= 1.2;
 else if(winRate < 50) tradeAmount *= 0.8;
 if(tradeAmount < 1) tradeAmount = 1;
}

function evaluate(price){
 if(!lastSignal) return;
 let win = (lastSignal.dir === "BUY" && price > lastSignal.entry) ||
           (lastSignal.dir === "SELL" && price < lastSignal.entry);
 if(win){ wins++; balance += tradeAmount * 0.8; }
 else { losses++; balance -= tradeAmount; }
 AIAdjust();
 lastSignal = null;
}

async function scan(){
 let now=new Date();
 let sec=now.getSeconds();

 if(sec < 55) return;
 if(Date.now() - lastSignalTime < 60000) return;

 let best=null;

 for(let pair of PAIRS){
   let d=await getData(pair);
   if(!d) continue;

   let last=d[d.length-1];
   let prev=d[d.length-2];

   evaluate(last);

   let trend = ema(d,20) > ema(d,50) ? "BUY" : "SELL";
   let direction = last>prev ? "BUY" : "SELL";

   let score=0;
   if(trend===direction) score+=2;
   if(strongCandle(d)) score+=2;
   if(!fakeBreakout(d)) score+=2;

   if(score >=6){
     best = {pair, direction, score, price:last};
     break;
   }
 }

 if(best){
   let probability = Math.min(95, 50 + best.score * 7);

   document.getElementById("signal").innerHTML = "💣 ULTRA: " + best.direction;
   document.getElementById("info").innerHTML = `Pair: ${best.pair} | Score: ${best.score} | Hold: 1 Min`;

   lastSignal = {dir:best.direction, entry:best.price};
   lastSignalTime = Date.now();

   updateUI(probability);

   sendTelegram(`💣 ULTRA SIGNAL\n${best.pair} ${best.direction}\nWin%: ${probability}%\nHold: 1 Min\nTrade: $${tradeAmount.toFixed(2)}`);
 }
}

function start(){
 setInterval(scan,1000);
}
</script></body>
</html>
