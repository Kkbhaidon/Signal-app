<!DOCTYPE html><html>
<head>
  <title>💀 DUAL MODE INSTITUTIONAL DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {margin:0;font-family:Arial;background:linear-gradient(135deg,#020617,#0f172a);color:white}
    .header {padding:15px;text-align:center;font-size:22px;border-bottom:1px solid #1e293b}
    .container {padding:15px;display:grid;gap:15px}
    .card {background:#0f172a;padding:15px;border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,0.6)}
    .big {font-size:40px;font-weight:bold;letter-spacing:2px}
    .pair {font-size:28px;font-weight:bold;color:#38bdf8}
    button {width:100%;padding:12px;border:none;border-radius:12px;margin-top:5px;color:white}
    .green {background:#22c55e}
    .blue {background:#3b82f6}
    .row {display:flex;justify-content:space-between;margin-top:5px}
  </style>
</head>
<body><div class="header">💀 DUAL MODE AI TRADING TERMINAL</div><div class="container"><div class="card">
  <button class="green" onclick="setMode('simple')">🟢 Simple Mode</button>
  <button class="blue" onclick="setMode('pro')">🔴 Institutional Mode</button>
</div><div class="card">
  <div id="mode">Mode: SIMPLE</div>
</div><div class="card">
  <div id="signal" class="big">WAIT...</div>
  <div id="pair" class="pair"></div>
</div><div class="card">
  <div class="row"><span>📊 Score</span><span id="score">-</span></div>
  <div class="row"><span>🎯 Win %</span><span id="prob">-</span></div>
  <div class="row"><span>⏱ Timer</span><span id="timer">-</span></div>
</div><div class="card">
  <div class="row"><span>✅ Wins</span><span id="wins">0</span></div>
  <div class="row"><span>❌ Loss</span><span id="losses">0</span></div>
</div><div class="card">
  <div><b>📜 History</b></div>
  <div id="history"></div>
</div></div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";
const BOT_TOKEN = "8276519624:AAHCboXuosrJCLcqQi6ZP4f0MT1xY7voPuk";
const CHAT_ID = "741726963";

const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];

let mode = localStorage.getItem("mode") || "simple";
let wins = parseInt(localStorage.getItem("wins") || 0);
let losses = parseInt(localStorage.getItem("losses") || 0);
let history = JSON.parse(localStorage.getItem("history") || "[]");

let lastSignal=null;
let timerInt;
let countdown=60;

function sendTelegram(msg){
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

function setMode(m){
 mode = m;
 localStorage.setItem("mode", m);
 document.getElementById("mode").innerHTML = "Mode: " + m.toUpperCase();
}

document.getElementById("mode").innerHTML = "Mode: " + mode.toUpperCase();

async function getData(pair){
 let res=await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=50&apikey=${API_KEY}`);
 let data=await res.json();
 if(!data.values) return null;
 return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
 let k=2/(p+1),e=data[0];
 for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
 return e;
}

function startTimer(){
 countdown=60;
 clearInterval(timerInt);
 timerInt=setInterval(()=>{
  countdown--;
  document.getElementById("timer").innerHTML=countdown+"s";
  if(countdown<=0){
    clearInterval(timerInt);
    checkResult();
  }
 },1000);
}

async function checkResult(){
 if(!lastSignal) return;

 let d=await getData(lastSignal.pair);
 if(!d) return;

 let latest=d[d.length-1];

 let win=(lastSignal.dir==="BUY" && latest>lastSignal.entry)||
         (lastSignal.dir==="SELL" && latest<lastSignal.entry);

 if(win){wins++;} else {losses++;}

 localStorage.setItem("wins", wins);
 localStorage.setItem("losses", losses);

 history.push(`${lastSignal.pair} ${lastSignal.dir} -> ${win?"WIN":"LOSS"}`);
 if(history.length>50) history.shift();
 localStorage.setItem("history", JSON.stringify(history));

 lastSignal=null;
}

function renderHistory(){
 let h = JSON.parse(localStorage.getItem("history") || "[]");
 document.getElementById("history").innerHTML = h.slice().reverse().map(x=>`<div>${x}</div>`).join("");
 document.getElementById("wins").innerHTML=wins;
 document.getElementById("losses").innerHTML=losses;
}

async function scan(){
 let sec=new Date().getSeconds();
 if(sec>5) return;

 let best=null;

 for(let pair of PAIRS){
  let d=await getData(pair);
  if(!d) continue;

  let last=d[d.length-1];
  let prev=d[d.length-2];

  let dir,score=0;

  if(mode==="simple"){
    let trend=ema(d,10)>ema(d,20)?"BUY":"SELL";
    dir=last>prev?"BUY":"SELL";
    if(trend===dir) score+=2;
    if(Math.abs(last-prev)>0.0002) score+=2;
  } else {
    let trend=ema(d,20)>ema(d,50)?"BUY":"SELL";
    dir=last>prev?"BUY":"SELL";
    if(trend===dir) score+=2;
    if(Math.abs(last-prev)>0.0003) score+=2;
  }

  if(score>=4){
    if(!best || score>best.score){
      best={pair,dir,score,entry:last};
    }
  }
 }

 if(best){
  let prob=60+best.score*10;

  document.getElementById("signal").innerHTML=best.dir;
  document.getElementById("pair").innerHTML=best.pair;
  document.getElementById("score").innerHTML=best.score;
  document.getElementById("prob").innerHTML=prob+"%";

  lastSignal=best;

  sendTelegram(`💀 ${mode.toUpperCase()} SIGNAL\n${best.pair} ${best.dir}\nWin%:${prob}%`);

  // 🔊 Speak signal
  speak(`${best.pair.replace('/', ' ')} ${best.dir === 'BUY' ? 'UP' : 'DOWN'}`);

  startTimer();
 }
}

function start(){
 renderHistory();
 setInterval(()=>{
  scan();
  renderHistory();
 },1000);
}
// 🔊 Voice Alert
function speak(text){
  try{
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
  }catch(e){}
}

</script></body>
</html>
