<!DOCTYPE html>
<html>
<head>
  <title>🔥 Stable Signal System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {margin:0;font-family:Arial;background:#020617;color:white;text-align:center}
    .box {margin-top:100px}
    .signal {font-size:48px;font-weight:bold}
    .pair {font-size:28px;color:#38bdf8;margin-top:10px}
    .info {margin-top:10px;color:#94a3b8}
    button {margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:#22c55e;color:white;font-size:16px}
  </style>
</head>
<body>

<div class="box">
  <div id="signal" class="signal">WAIT</div>
  <div id="pair" class="pair"></div>
  <div id="info" class="info"></div>
  <button onclick="start()">START</button>
</div>

<script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";
const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];

let running = false;

async function getData(pair){
  try{
    let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=10&apikey=${API_KEY}`);
    let data = await res.json();
    if(!data.values) return null;
    return data.values.reverse().map(v=>parseFloat(v.close));
  }catch(e){
    return null;
  }
}

function ema(data,p){
  let k=2/(p+1), e=data[0];
  for(let i=1;i<data.length;i++) e=data[i]*k + e*(1-k);
  return e;
}

async function scan(){
  let best = null;

  for(let pair of PAIRS){
    let d = await getData(pair);
    if(!d) continue;

    let last = d[d.length-1];
    let prev = d[d.length-2];

    let trend = ema(d,10) > ema(d,20) ? "BUY" : "SELL";
    let dir = last > prev ? "BUY" : "SELL";

    let score = 0;

    if(trend === dir) score += 2;
    if(Math.abs(last - prev) > 0.0002) score += 1;

    if(!best || score > best.score){
      best = {pair, dir, score};
    }
  }

  // 🔥 fallback (never blank)
  if(!best){
    let pair = "EUR/USD";
    let d = await getData(pair);
    if(!d) return;

    let last = d[d.length-1];
    let prev = d[d.length-2];

    best = {
      pair,
      dir: last > prev ? "BUY" : "SELL",
      score: 1
    };
  }

  let strength = best.score >= 3 ? "🔥 STRONG" : "⚡ NORMAL";

  document.getElementById("signal").innerHTML = best.dir;
  document.getElementById("pair").innerHTML = best.pair;
  document.getElementById("info").innerHTML = strength;
}

function start(){
  if(running) return;
  running = true;

  // 🔥 run every 10 sec (better than 1 min)
  setInterval(scan,10000);
  scan();
}
</script>

</body>
</html>
