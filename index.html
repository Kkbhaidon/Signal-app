<!DOCTYPE html><html>
<head>
  <title>💣 ULTIMATE PRO+ SIGNAL ENGINE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; text-align:center; background:#020617; color:white; }
    .box { margin-top:20px; padding:20px; border-radius:15px; background:#0f172a; }
    button, select { padding:10px; margin:5px; border-radius:10px; }
    .buy { color:#22c55e; font-size:26px; }
    .sell { color:#ef4444; font-size:26px; }
    .neutral { color:#eab308; }
  </style>
</head>
<body><h2>🚀 ULTIMATE PRO+ FOREX AI SIGNAL</h2><div class="box">
  <select id="time">
    <option value="1">1 Min</option>
    <option value="3">3 Min</option>
    <option value="5">5 Min</option>
  </select>  <h3 id="signal">Start Engine</h3>
  <p id="pair"></p>
  <p id="info"></p>
  <p id="timer"></p><button onclick="startAuto()">Start PRO+ Scanner</button>

</div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";

const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];

let intervalId;

if(Notification.permission !== "granted"){
  Notification.requestPermission();
}

async function fetchData(pair){
  let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=120&apikey=${API_KEY}`;
  let res = await fetch(url);
  let data = await res.json();
  if(!data.values) return null;
  return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
  let k=2/(p+1), e=data[0];
  for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
  return e;
}

function rsi(data){
  let g=0,l=0;
  for(let i=1;i<15;i++){
    let d=data[data.length-i]-data[data.length-i-1];
    if(d>0) g+=d; else l-=d;
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function sr(data){
  return {
    support: Math.min(...data.slice(-30)),
    resistance: Math.max(...data.slice(-30))
  };
}

function liquidity(data){
  let last=data[data.length-1];
  let prev=data[data.length-2];

  if(last>Math.max(...data.slice(-10)) && last<prev) return "SELL";
  if(last<Math.min(...data.slice(-10)) && last>prev) return "BUY";
  return null;
}

async function scan(){
  let best=null;

  for(let pair of PAIRS){
    let d=await fetchData(pair);
    if(!d) continue;

    let last=d[d.length-1];
    let prev=d[d.length-2];

    let e20=ema(d,20);
    let e50=ema(d,50);
    let r=rsi(d);
    let zone=sr(d);
    let liq=liquidity(d);

    let score=0;

    let up=e20>e50;
    let down=e20<e50;

    if(up) score++;
    if(down) score++;
    if(r>40 && r<60) score++;

    if(Math.abs(last-zone.support)<0.0005) score+=2;
    if(Math.abs(last-zone.resistance)<0.0005) score+=2;

    if(liq) score+=2;

    if(up && last>prev) score++;
    if(down && last<prev) score++;

    if(score>=5){
      best={pair,dir: up?"BUY":"SELL",score};
      break;
    }
  }

  if(best){
    show(best.pair,best.dir,best.score);
  }else{
    document.getElementById("signal").innerHTML="⚠️ WAIT";
  }
}

function show(pair,dir,score){
  let s=document.getElementById("signal");
  s.innerHTML=dir==="BUY"?"🟢 BUY":"🔴 SELL";
  s.className=dir==="BUY"?"buy":"sell";

  document.getElementById("pair").innerHTML="Pair: "+pair;
  document.getElementById("info").innerHTML="Power Score: "+score+"/8";

  if(Notification.permission==="granted"){
    new Notification("💣 PRO+ SIGNAL",{body:pair+" → "+dir});
  }
}

function startAuto(){
  clearInterval(intervalId);
  let t=parseInt(document.getElementById("time").value)*60;

  scan();
  let left=t;

  intervalId=setInterval(()=>{
    left--;
    document.getElementById("timer").innerHTML="Next: "+left+"s";
    if(left<=0){scan();left=t;}
  },1000);
}
</script></body>
</html>
