<!DOCTYPE html><html>
<head>
  <title>🤖 AI Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#020617; color:white; font-family:Arial; margin:0; }
    .container { padding:15px; }
    .card { background:#0f172a; padding:15px; border-radius:12px; margin-bottom:10px; }
    .big { font-size:24px; font-weight:bold; }
  </style>
</head>
<body><div class="container"><div class="card">
  <button onclick="start()">🚀 Start AI System</button>
</div><div class="card">
  <div id="signal" class="big">WAIT...</div>
  <div id="pair"></div>
  <div id="prob"></div>
  <div id="stats"></div>
</div></div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";

// 🔔 TELEGRAM AUTO CONNECT
const BOT_TOKEN = "8276519624:AAHCboXuosrJCLcqQi6ZP4f0MT1xY7voPuk";
const CHAT_ID = "741726963";

function sendTelegram(msg){
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];

let wins = 0, losses = 0;
let pairStats = {};
let lastSignal = null;

PAIRS.forEach(p => pairStats[p] = {win:0, loss:0});

async function getData(pair){
 let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=20&apikey=${API_KEY}`);
 let data = await res.json();
 if(!data.values) return null;
 return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
 let k=2/(p+1), e=data[0];
 for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
 return e;
}

function pairAccuracy(pair){
 let s = pairStats[pair];
 let total = s.win + s.loss;
 if(total===0) return 50;
 return (s.win/total)*100;
}

function updateUI(pair,dir,prob,acc){
 document.getElementById("signal").innerHTML = dir;
 document.getElementById("pair").innerHTML = pair;
 document.getElementById("prob").innerHTML = `Win%: ${prob}% | Pair Acc: ${acc.toFixed(1)}%`;

 let total = wins+losses;
 let overall = total? (wins/total*100).toFixed(1):0;

 document.getElementById("stats").innerHTML = `Win: ${wins} | Loss: ${losses} | Acc: ${overall}%`;
}

async function checkResult(){
 if(!lastSignal) return;

 let d = await getData(lastSignal.pair);
 if(!d) return;

 let latest = d[d.length-1];

 let win = (lastSignal.dir==="BUY" && latest>lastSignal.entry) ||
           (lastSignal.dir==="SELL" && latest<lastSignal.entry);

 if(win){
   wins++;
   pairStats[lastSignal.pair].win++;
 }else{
   losses++;
   pairStats[lastSignal.pair].loss++;
 }

 lastSignal = null;
}

async function scan(){
 let sec = new Date().getSeconds();

 if(sec===59) await checkResult();

 if(sec!==0) return;

 let best=null;

 for(let pair of PAIRS){
   let d = await getData(pair);
   if(!d) continue;

   let last=d[d.length-1];
   let prev=d[d.length-2];

   let trend = ema(d,10)>ema(d,20)?"BUY":"SELL";
   let dir = last>prev?"BUY":"SELL";

   let score=0;
   if(trend===dir) score+=2;
   if(Math.abs(last-prev)>0.0002) score+=1;

   let acc = pairAccuracy(pair);

   if(acc>70) score+=2;
   else if(acc>60) score+=1;

   if(!best || score>best.score){
     best = {pair,dir,score,entry:last,acc};
   }
 }

 if(best){
   let prob = Math.min(95, 50 + best.score*10);

   updateUI(best.pair,best.dir,prob,best.acc);

   lastSignal = best;
 }
}

function start(){
 setInterval(scan,1000);
}
</script></body>
</html>
