<!DOCTYPE html>
<html>
<head>
  <title>🚀 SNIPER PRO MAX SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#020617; color:white; font-family:Arial; }
    .card { background:#0f172a; padding:15px; margin:10px; border-radius:10px; }
    .buy { color:#22c55e; }
    .sell { color:#ef4444; }
  </style>
</head>
<body>

<div class="card">
  <button onclick="start()">🔥 Start Sniper Mode</button>
</div>

<div class="card">
  <h3 id="signal">WAIT...</h3>
  <p id="info"></p>
</div>

<script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";

// 🔔 TELEGRAM (already added)
const BOT_TOKEN = "8276519624:AAHCboXuosrJCLcqQi6ZP4f0MT1xY7voPuk";
const CHAT_ID = "741726963";

// 🎯 ONLY 6 FOREX PAIRS
const PAIRS = [
  "EUR/USD",
  "GBP/USD",
  "USD/JPY",
  "AUD/USD",
  "USD/CAD",
  "EUR/JPY"
];

let lastSignalTime = 0;

function sendTelegram(msg){
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

async function getData(pair){
 let url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=50&apikey=${API_KEY}`;
 let res = await fetch(url);
 let data = await res.json();
 if(!data.values) return null;
 return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
 let k=2/(p+1), e=data[0];
 for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
 return e;
}

// 🔥 Fake breakout filter
function fakeBreakout(data){
 let last=data[data.length-1];
 let prev=data[data.length-2];

 let high=Math.max(...data.slice(-5));
 let low=Math.min(...data.slice(-5));

 if(last>high && last<prev) return "SELL";
 if(last<low && last>prev) return "BUY";

 return null;
}

async function scan(){
 let now=new Date();
 let sec=now.getSeconds();

 // 🎯 ONLY LAST 5 SECONDS
 if(sec < 55) return;

 // ⛔ duplicate signals avoid
 if(Date.now() - lastSignalTime < 60000) return;

 for(let pair of PAIRS){
   let d=await getData(pair);
   if(!d) continue;

   let last=d[d.length-1];
   let prev=d[d.length-2];

   let e20=ema(d,20);
   let e50=ema(d,50);

   let trend=e20>e50 ? "BUY" : "SELL";
   let momentum=Math.abs(last-prev);
   let fake=fakeBreakout(d);

   let score=0;

   // 🔥 Double confirmation
   if(trend==="BUY" && last>prev) score++;
   if(trend==="SELL" && last<prev) score++;

   // ⚡ Momentum filter
   if(momentum > 0.0003) score++;

   // 🚫 Fake breakout filter
   if(!fake) score++;

   // 🎯 FINAL SNIPER CONDITION
   if(score >= 3){

     document.getElementById("signal").innerHTML="🎯 SNIPER: "+trend;
     document.getElementById("info").innerHTML=`Pair: ${pair} | Score: ${score}`;

     lastSignalTime = Date.now();

     sendTelegram(`🎯 SNIPER SIGNAL\n${pair} ${trend}\nScore: ${score}\nEntry: Next Candle`);

     return;
   }
 }
}

function start(){
 setInterval(scan,1000);
}
</script>

</body>
</html>
