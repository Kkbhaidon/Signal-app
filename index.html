<!DOCTYPE html><html>
<head>
  <title>Simple Smart Signal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {margin:0;font-family:Arial;background:#020617;color:white;text-align:center}
    .box {margin-top:100px}
    .signal {font-size:44px;font-weight:bold}
    .pair {font-size:26px;color:#38bdf8;margin-top:10px}
    .info {margin-top:10px;color:#94a3b8}
    button {margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:#22c55e;color:white;font-size:16px}
  </style>
</head>
<body><div class="box">
  <div id="signal" class="signal">WAIT</div>
  <div id="pair" class="pair"></div>
  <div id="info" class="info"></div>
  <button onclick="start()">START</button>
</div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";

const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];
let running = false;
let pairIndex = 0;

async function getData(pair){
  let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=20&apikey=${API_KEY}`);
  let data = await res.json();
  if(!data.values) return null;
  return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
  let k=2/(p+1), e=data[0];
  for(let i=1;i<data.length;i++) e=data[i]*k + e*(1-k);
  return e;
}

async function scan(){
  // rotate pairs (random nahi, stable)
  let pair = PAIRS[pairIndex % PAIRS.length];
  pairIndex++;

  let d = await getData(pair);
  if(!d) return;

  let last = d[d.length-1];
  let prev = d[d.length-2];

  // simple + smart logic
  let trend = ema(d,10) > ema(d,20) ? "BUY" : "SELL";
  let moveStrong = Math.abs(last - prev) > 0.0002;
  let dir = last > prev ? "BUY" : "SELL";

  // decision
  let final = (trend === dir && moveStrong) ? dir : trend; // fallback = trend

  document.getElementById("signal").innerHTML = final;
  document.getElementById("pair").innerHTML = pair;
  document.getElementById("info").innerHTML = moveStrong ? "Strong move" : "Normal";
}

function start(){
  if(running) return;
  running = true;

  // run every new minute approx
  setInterval(scan,60000);
  scan();
}
</script></body>
</html>
