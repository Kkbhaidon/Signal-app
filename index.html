<!DOCTYPE html><html>
<head>
  <title>💣 ULTRA SNIPER PRO DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:white;
    }.header {
  padding:15px;
  text-align:center;
  font-size:22px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.container {
  padding:15px;
  display:grid;
  gap:15px;
}

.card {
  background:#0f172a;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.big {
  font-size:28px;
  font-weight:bold;
}

.buy { color:#22c55e; }
.sell { color:#ef4444; }

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  font-size:16px;
}

.row {
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.tag {
  padding:5px 10px;
  border-radius:8px;
  background:#1e293b;
  font-size:12px;
}

  </style>
</head>
<body><div class="header">🚀 ULTRA SNIPER DASHBOARD</div><div class="container"><div class="card">
  <button onclick="start()">💣 Start Trading Engine</button>
</div><div class="card">
  <div id="signal" class="big">WAIT...</div>
  <div id="pair"></div>
</div><div class="card">
  <div class="row"><span>🎯 Score</span><span id="score">-</span></div>
  <div class="row"><span>📊 Win %</span><span id="prob">-</span></div>
  <div class="row"><span>⏱ Hold</span><span>1 Min</span></div>
</div><div class="card">
  <div class="row"><span>✅ Wins</span><span id="wins">0</span></div>
  <div class="row"><span>❌ Loss</span><span id="losses">0</span></div>
</div><div class="card">
  <div class="row"><span>💰 Balance</span><span id="balance">$10</span></div>
  <div class="row"><span>⚡ Trade</span><span id="trade">$1</span></div>
</div></div><script>
const API_KEY = "4a3eacedc8fa46448e62978e993c0422";
const BOT_TOKEN = "8276519624:AAHCboXuosrJCLcqQi6ZP4f0MT1xY7voPuk";
const CHAT_ID = "741726963";

const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","EUR/JPY"];

let wins=0, losses=0;
let balance=10;
let trade=1;
let lastSignal=null;
let lastTime=0;

function sendTelegram(msg){
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
}

async function getData(pair){
 let res = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=1min&outputsize=50&apikey=${API_KEY}`);
 let data = await res.json();
 if(!data.values) return null;
 return data.values.reverse().map(v=>parseFloat(v.close));
}

function ema(data,p){
 let k=2/(p+1), e=data[0];
 for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
 return e;
}

function strong(data){
 let a=data[data.length-1];
 let b=data[data.length-2];
 return Math.abs(a-b)>0.0003;
}

async function scan(){
 let sec=new Date().getSeconds();
 if(sec<55) return;
 if(Date.now()-lastTime<60000) return;

 for(let pair of PAIRS){
  let d=await getData(pair);
  if(!d) continue;

  let last=d[d.length-1];
  let prev=d[d.length-2];

  let trend = ema(d,20)>ema(d,50)?"BUY":"SELL";
  let dir = last>prev?"BUY":"SELL";

  let score=0;
  if(trend===dir) score+=2;
  if(strong(d)) score+=2;

  if(score>=4){

    let prob=Math.min(95,50+score*8);

    document.getElementById("signal").innerHTML = dir==="BUY"?"🟢 BUY":"🔴 SELL";
    document.getElementById("pair").innerHTML = pair;
    document.getElementById("score").innerHTML = score;
    document.getElementById("prob").innerHTML = prob+"%";

    lastSignal={dir:dir,entry:last};
    lastTime=Date.now();

    sendTelegram(`💣 SIGNAL\n${pair} ${dir}\nWin%:${prob}%\nTrade:$${trade}`);

    return;
  }
 }
}

function start(){
 setInterval(scan,1000);
}
</script></body>
</html>
